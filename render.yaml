services:
  - type: web
    name: django-backend
    env: python
    buildCommand: "./backend/build.sh"
    startCommand: "cd backend && gunicorn backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: comments-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: FRONTEND_URL
        value: "https://frontend-react.onrender.com"

  - type: web
    name: frontend-react
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: django-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: comments-db
    databaseName: comments
    user: comments_user
